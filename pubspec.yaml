name: cute_pixel
description: "cute_pixel — 像素风 Flutter + GetX + Flame 通用底座(内置 cute_pet demo)。"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flame: ^1.37.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  get: ^4.7.3
  intl: ^0.20.2
  json_annotation: ^4.11.0
  logger: ^2.7.0
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.2
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  generate: true

  # ── 资源声明 ────────────────────────────────────────────────────────────
  # cute_pixel 资源按类型分目录:assets/sprites/ items/ ui/ scenes/ effects/
  # tilemaps/ audio/ fonts/。每类下都有 _template/ 骨架,**不要**启用模板。
  # 真资源按 namespace 启用,例如:
  # assets:
  #   - assets/sprites/pets/shibainu/
  #   - assets/items/food/apple/
  #   - assets/ui/buttons/primary/
  #   - assets/audio/sfx/click/
  # TTF 字体走单独的 fonts: 段(见 assets/fonts/_template/README.md 选项 B)。
  # 完整目录约定见 doc/pixel-foundation.md "Asset 资源约定" 与 assets/README.md。
